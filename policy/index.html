<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Legal — Remembite</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:        #FAF7F2;
      --surface:   #F2EDE5;
      --elevated:  #EBE4D9;
      --border:    #D9CFC3;
      --text:      #1C1410;
      --secondary: #5C4A38;
      --muted:     #7A6350;
      --accent:    #C47E10;
      --accent-dk: #A36808;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 20px 24px;
    }

    header .logo {
      font-family: 'Fraunces', serif;
      font-size: 22px;
      font-weight: 700;
      color: var(--accent);
      text-decoration: none;
    }

    main {
      flex: 1;
      max-width: 600px;
      margin: 80px auto;
      padding: 0 24px;
      text-align: center;
    }

    .section-label {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      text-transform: uppercase;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      color: var(--secondary);
      margin-bottom: 16px;
    }

    .section-label::before {
      content: '';
      display: block;
      width: 24px;
      height: 2px;
      background: var(--accent);
    }

    h1 {
      font-family: 'Fraunces', serif;
      font-size: 40px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 12px;
    }

    .subtitle {
      color: var(--muted);
      font-size: 16px;
      margin-bottom: 48px;
    }

    .links {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .link-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 28px 24px;
      text-decoration: none;
      transition: border-color 0.15s, box-shadow 0.15s;
      text-align: left;
    }

    .link-card:hover {
      border-color: var(--accent);
      box-shadow: 0 4px 16px rgba(196, 126, 16, 0.1);
    }

    .link-card .icon {
      font-size: 28px;
      margin-bottom: 12px;
    }

    .link-card h2 {
      font-family: 'Fraunces', serif;
      font-size: 18px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 6px;
    }

    .link-card p {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.5;
    }

    footer {
      text-align: center;
      padding: 24px;
      border-top: 1px solid var(--border);
      color: var(--muted);
      font-size: 13px;
    }

    @media (max-width: 500px) {
      h1 { font-size: 30px; }
      .links { grid-template-columns: 1fr; }
      main { margin: 48px auto; }
    }
  </style>
</head>
<body>

<header>
  <a class="logo" href="index.html">Remembite</a>
</header>

<main>
  <div class="section-label">Legal</div>
  <h1>Policies &amp; Terms</h1>
  <p class="subtitle">Everything you need to know about how we handle your data and our terms of use.</p>

  <div class="links">
    <a class="link-card" href="privacy-policy.html">
      <div class="icon">🔒</div>
      <h2>Privacy Policy</h2>
      <p>How we collect, use, and protect your personal data.</p>
    </a>
    <a class="link-card" href="terms.html">
      <div class="icon">📄</div>
      <h2>Terms of Service</h2>
      <p>Rules and guidelines for using Remembite.</p>
    </a>
  </div>
</main>

<footer>
  <p>&copy; 2026 Remembite &nbsp;·&nbsp; <a href="mailto:support@remembite.com" style="color: var(--accent);">support@remembite.com</a></p>
</footer>

</body>
</html>
