# Production compose — runs on the VPS.
# Postgres runs as a container with a named volume for persistence.
# Caddy handles HTTPS (auto SSL via Let's Encrypt) and proxies to backend.
# Secrets come from /opt/remembite/.env.api on the host.

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: remembite
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: remembite
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U remembite -d remembite"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: ghcr.io/fennsaji/remembite-backend:latest
    restart: unless-stopped
    env_file: .env.api
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend

  vector:
    image: timberio/vector:0.43.0-alpine
    restart: unless-stopped
    environment:
      AXIOM_API_KEY: ${AXIOM_API_KEY}
      AXIOM_DATASET: ${AXIOM_DATASET}
    volumes:
      - ./vector.toml:/etc/vector/vector.toml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - backend

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
