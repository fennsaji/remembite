# Production compose — runs on the VPS.
# Postgres is NOT here — it's on Neon (external).
# Secrets come from /opt/remembite/.env.api on the host.

services:
  backend:
    image: ghcr.io/fennsaji/remembite-backend:latest
    restart: unless-stopped
    env_file: .env.api
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
