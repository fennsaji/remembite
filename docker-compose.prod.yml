# Production compose — runs on the VPS.
# Postgres runs as a container with a named volume for persistence.
# Secrets come from /opt/remembite/.env.api on the host.

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: remembite
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: remembite
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U remembite -d remembite"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: ghcr.io/fennsaji/remembite-backend:latest
    restart: unless-stopped
    env_file: .env.api
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  postgres_data:
