name: Deploy Policy Pages to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'policy/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload policy directory
        uses: actions/upload-pages-artifact@v3
        with:
          path: policy/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
