name: Deploy Android to Play Store (Internal Testing)

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - 'distribution/whatsnew/**'
      - '.github/workflows/android-deploy-playstore.yml'
  workflow_dispatch:
    inputs:
      release_notes:
        description: "What's new in this release? (shown to testers, max 500 chars)"
        required: true

env:
  JAVA_VERSION: '17'
  FLUTTER_VERSION: '3.32.6'

permissions:
  contents: write

jobs:
  build-and-deploy:
    name: Build AAB & Deploy to Internal Testing
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Validate release notes
        env:
          INPUT_RELEASE_NOTES: ${{ github.event.inputs.release_notes }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            NOTES="$INPUT_RELEASE_NOTES"
          else
            APP_CHANGED=$(git diff --name-only HEAD~1 HEAD | grep -c "^app/" || true)
            if [ "$APP_CHANGED" -gt 0 ]; then
              if ! git diff --name-only HEAD~1 HEAD | grep -q "distribution/whatsnew/"; then
                echo "Release notes not updated for this release."
                echo "Update distribution/whatsnew/whatsnew-en-IN before merging to main."
                exit 1
              fi
            fi
            NOTES=$(cat distribution/whatsnew/whatsnew-en-IN 2>/dev/null || echo "")
          fi

          TRIMMED=$(echo "$NOTES" | tr -d '[:space:]')
          if [ -z "$TRIMMED" ]; then
            echo "Release notes are empty."
            exit 1
          fi
          if [ ${#NOTES} -lt 10 ]; then
            echo "Release notes are too short (min 10 chars)."
            exit 1
          fi
          echo "Release notes accepted: $NOTES"

      # ── Java ────────────────────────────────────────────────────────────────
      - name: Setup Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: ${{ env.JAVA_VERSION }}
          cache: 'gradle'

      # ── Flutter ─────────────────────────────────────────────────────────────
      - name: Setup Flutter ${{ env.FLUTTER_VERSION }}
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: flutter pub get
        working-directory: app
        run: flutter pub get

      - name: Generate .g.dart files
        working-directory: app
        run: dart run build_runner build --delete-conflicting-outputs

      # ── Signing keystore ─────────────────────────────────────────────────────
      - name: Decode upload keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > app/android/upload-keystore.jks

      # ── Inject Maps API key into local.properties (picked up by gradle manifestPlaceholders) ──
      - name: Inject Maps API key
        env:
          MAPS_API_KEY: ${{ secrets.MAPS_API_KEY }}
        run: printf 'MAPS_API_KEY=%s\n' "$MAPS_API_KEY" >> app/android/local.properties

      # ── Google Services ──────────────────────────────────────────────────────
      - name: Write google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: echo "$GOOGLE_SERVICES_JSON" > app/android/app/google-services.json

      # ── Build ────────────────────────────────────────────────────────────────
      - name: Build release AAB
        working-directory: app
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -Dorg.gradle.parallel=true"
          KEY_ALIAS:      ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD:   ${{ secrets.ANDROID_KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          STORE_FILE:     "../upload-keystore.jks"
        run: |
          flutter build appbundle \
            --release \
            --dart-define=API_URL=https://api.remembite.fennsaji.com \
            --dart-define=MAPS_API_KEY=${{ secrets.MAPS_API_KEY }} \
            --dart-define=GOOGLE_WEB_CLIENT_ID=${{ secrets.GOOGLE_WEB_CLIENT_ID }} \
            --build-number=${{ github.run_number }} \
            --build-name=1.0.${{ github.run_number }}

      # ── Write release notes (manual dispatch overrides file) ─────────────────
      - name: Write release notes
        env:
          INPUT_RELEASE_NOTES: ${{ github.event.inputs.release_notes }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            NOTES="${INPUT_RELEASE_NOTES:0:500}"
            echo "$NOTES" > distribution/whatsnew/whatsnew-en-IN
            echo "$NOTES" > distribution/whatsnew/whatsnew-en-US
          fi

      # ── Play Store ───────────────────────────────────────────────────────────
      - name: Write Play Store service account
        env:
          GOOGLE_PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
        run: echo "$GOOGLE_PLAY_SERVICE_ACCOUNT_JSON" > play-store-service-account.json

      - name: Upload to Play Store Internal Testing
        uses: r0adkll/upload-google-play@v1.1.3
        with:
          serviceAccountJson: play-store-service-account.json
          packageName: com.fennsaji.remembite
          releaseFiles: app/build/app/outputs/bundle/release/app-release.aab
          track: internal
          status: completed
          whatsNewDirectory: distribution/whatsnew

      # ── Cleanup sensitive files ──────────────────────────────────────────────
      - name: Security cleanup
        if: always()
        run: |
          rm -f app/android/upload-keystore.jks
          rm -f app/android/app/google-services.json
          rm -f play-store-service-account.json
          grep -E "^sdk\.dir=" app/android/local.properties > /tmp/lp.tmp || true
          mv /tmp/lp.tmp app/android/local.properties

      # ── Artifacts & Release ──────────────────────────────────────────────────
      - name: Upload AAB as workflow artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: remembite-aab-${{ github.run_number }}
          path: app/build/app/outputs/bundle/release/app-release.aab
          retention-days: 90

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}-beta
          name: Beta v1.0.${{ github.run_number }}
          prerelease: true
          body: |
            ## Remembite Beta v1.0.${{ github.run_number }}

            **Track:** Internal Testing (Play Store)

            ### What's New
            ${{ github.event.inputs.release_notes || 'See distribution/whatsnew/whatsnew-en-IN' }}

            ### Build Details
            - **Version code:** ${{ github.run_number }}
            - **Commit:** ${{ github.sha }}
            - **Author:** ${{ github.event.head_commit.author.name }}
            - **Message:** ${{ github.event.head_commit.message }}

            ---
            Available to internal testers via Play Store
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
